<!DOCTYPE html>
<html>

<head>
<title>Success</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="no-scroll-page">

<div class="container">

<h2 id="thankMessage"></h2>

<p id="actionMessage"></p>

<button onclick="goHome()">Back to Home</button>

<button onclick="learnMore()">Learn How We Recycle</button>

<!-- ✅ Logout button added at the bottom -->
<button onclick="logout()" style="background:#9e9e9e;">
Log out
</button>

</div>

<script>

const name = localStorage.getItem("username");

if(name){
document.getElementById("thankMessage").innerText =
"Thank You Dear User " + name + "!";
}else{
document.getElementById("thankMessage").innerText =
"Thank You Dear User!";
}

const action = localStorage.getItem("action");

if(action === "donate"){
  document.getElementById("actionMessage").innerText =
  "Our people will come and collect the waste from you.";
}
else if(action === "buy"){
  document.getElementById("actionMessage").innerText =
  "Our people will come and buy it from you soon.";
}

function goHome(){
window.location.href = "index.html";
}

function learnMore(){
window.location.href = "learn.html";
}

// ✅ Logout function
function logout(){
localStorage.removeItem("isLoggedIn"); // remove only login state
window.location.href = "login.html";
}

</script>

</body>
</html>

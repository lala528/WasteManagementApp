<!DOCTYPE html>
<html>

<head>

<title>Select Waste</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h2>Select Waste Type</h2>

<div class="grid">

<div class="item" onclick="selectWaste('paper')">
<img src="images/paper.png">
<p>Paper</p>
</div>

<div class="item" onclick="selectWaste('plastic')">
<img src="images/platic.png">
<p>Plastic</p>
</div>

<div class="item" onclick="selectWaste('glass')">
<img src="images/glass.png">
<p>Glass</p>
</div>

<div class="item" onclick="selectWaste('tin')">
<img src="images/tin.png">
<p>Tin</p>
</div>

<div class="item" onclick="selectWaste('biodegradable')">
<img src="images/wetwaste.png">
<p>Biodegradable</p>
</div>


</div>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
